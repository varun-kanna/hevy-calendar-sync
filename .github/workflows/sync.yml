name: Sync Hevy Workouts to Google Calendar

on:
  schedule:
    - cron: '1 0 * * *'  # 12:01 AM UTC daily
  workflow_dispatch:       # Allow manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit state.toml back to the repo
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google API credentials
        # Secrets are passed via env vars to avoid shell quoting issues with JSON
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json
          echo "$GOOGLE_TOKEN_JSON" > token.json

      - name: Run sync
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
          HEVY_RESYNC_ALL: "false"
        run: python sync.py

      - name: Commit updated sync state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f state.toml
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update sync state [skip ci]"
            git push
          fi
